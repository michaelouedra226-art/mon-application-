name: Générer APK Android (Natif)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Compiler l'APK Android
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Décoder ou Générer le Keystore de Débogage
        run: |
          if [ -f debug.keystore.base64 ]; then
            echo "Décodage du debug.keystore existant..."
            base64 -d debug.keystore.base64 > debug.keystore
          elif [ ! -f debug.keystore ]; then
            echo "debug.keystore non trouvé. Génération automatique d'un Keystore de Débogage pour le build..."
            keytool -genkeypair -v \
              -keystore debug.keystore \
              -alias androiddebugkey \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -storepass android \
              -keypass android \
              -dname "CN=Android Debug, O=Android, C=US"
          fi

      - name: Configurer JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Configurer Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Compiler l'APK de Débogage (Debug)
        run: gradle :app:assembleDebug --no-daemon --no-configuration-cache

      - name: Téléverser l'APK généré comme artefact
        uses: actions/upload-artifact@v4
        with:
          name: mon-iptv-pro-apk
          path: app/build/outputs/apk/debug/app-debug.apk
