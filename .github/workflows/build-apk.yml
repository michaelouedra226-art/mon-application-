name: Générer APK Android (Natif)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Compiler l'APK Android
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Configurer JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Configurer Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Compiler l'APK de Débogage (Debug)
        run: gradle :app:assembleDebug --no-daemon

      - name: Téléverser l'APK généré comme artefact
        uses: actions/upload-artifact@v4
        with:
          name: mon-iptv-pro-apk
          path: app/build/outputs/apk/debug/app-debug.apk
